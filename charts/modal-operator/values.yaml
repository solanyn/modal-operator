replicaCount: 1

image:
  repository: ghcr.io/solanyn/modal-operator
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

modal:
  tokenSecret: modal-credentials
  tokenIdKey: MODAL_TOKEN_ID
  tokenSecretKey: MODAL_TOKEN_SECRET

watchNamespaces: ""

metrics:
  enabled: true
  port: 8081
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
